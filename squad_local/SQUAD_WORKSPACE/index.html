<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Architecture Management System</title>
    <!-- CDN de HTMX -->
    <script src='https://unpkg.com/htmx.org@2.0.0'></script>
    <!-- CDN de Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@latest/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <div class="container w-full md:max-w-3xl mx-auto pt-20">
        <div class="w-full px-4 mb-10">
            <h1 class="text-3xl text-center">Server Architecture Management System</h1>
            <p class="text-center">A simple system to manage server architectures.</p>
        </div>

        <!-- Ruta para crear una nueva arquitectura -->
        <form hx-post="/server_architectures/" hx-target="#server_architectures_list" hx-swap="innerHTML">
            <div class="md:flex md:items-center mb-6">
                <div class="w-full md:w-1/3 px-3">
                    <label for="name" class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2">Name</label>
                    <input id="name" name="name" type="text" placeholder="Enter server architecture name"
                           class="appearance-none block w-full bg-gray-200 text-gray-700 border border-red-500 rounded py-3 px-4 mb-3 leading-tight focus:outline-none focus:bg-white focus:border-blue-500">
                </div>
            </div>

            <!-- Ruta para listar todas las arquitecturas -->
            <div id="server_architectures_list" class="md:flex md:items-center mb-6"></div>
        </form>
    </div>
</body>
</html>
