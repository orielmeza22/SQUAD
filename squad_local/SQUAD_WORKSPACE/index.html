<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <!-- Estilos -->
  <link rel='stylesheet' href='styles.css'>
  
  <!-- Script de Tailwind CSS -->
  <script src='https://cdn.tailwindcss.com'></script>
</head>
<body class="bg-gray-900 text-white">
  <div class="min-h-screen flex items-center justify-center bg-cover" style="background-image: url('img/login-background.jpg')">
    <form action="/api/auth/login" method="post" class="max-w-md p-6 rounded-lg shadow-xl space-y-4">
      <!-- Nombre de Usuario -->
      <div>
        <label for="username" class="block text-sm font-medium">Nombre de Usuario:</label>
        <input type="text" id="username" name="username" required class="mt-1 block w-full p-2 border rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
      </div>

      <!-- Contraseña -->
      <div>
        <label for="password" class="block text-sm font-medium">Contraseña:</label>
        <input type="password" id="password" name="password" required class="mt-1 block w-full p-2 border rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
      </div>

      <!-- Botón de Iniciar Sesión -->
      <button type="submit" class="w-full flex justify
