<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Turno</title>
</head>
<body>
    <!-- Formulario para editar un turno -->
    <form id="edit-form">
        <input type="text" name="id" placeholder="ID del turno">  <!-- Agregar este campo -->
        <input type="text" name="nombre" placeholder="Nombre del turno">
        <input type="date" name="fecha" placeholder="Fecha del turno">
        <button type="submit">Guardar Cambios</button>
    </form>

    <!-- Formulario para agregar un nuevo turno -->
    <form id="add-form">
        <input type="text" name="nombre" placeholder="Nombre del turno">
        <input type="date" name="fecha" placeholder="Fecha del turno">
        <button type="submit">Agregar Turno</button>
    </form>

</body>
</html>
