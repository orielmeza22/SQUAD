<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de CV</title>
    <!-- Estilos CSS -->
    <link rel='stylesheet' href='styles.css'>
    
    <!-- Script de Tailwind -->
    <script src='https://cdn.tailwindcss.com'></script>
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-center mb-6">Generador de CV</h1>
        
        <!-- Formulario de Datos Personales -->
        <form id="personal-form" class="mb-6">
            <label for="nombre" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Ejemplo: Juan" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="apellido" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required placeholder="Ejemplo: Pérez" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="email" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Email:</label>
            <input type="email" id="email" name="email" required placeholder="Ejemplo: juan.perez@example.com" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="telefono" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ejemplo: 1234567890" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="direccion" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Dirección:</label>
            <input type="text" id="direccion" name="direccion" placeholder="Ejemplo: Calle Ejemplo 123, Ciudad Ejemplo" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="fecha_nacimiento" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Fecha de Nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required placeholder="Ejemplo: 2001-04-25" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="ciudad_residencia" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Ciudad de Residencia:</label>
            <input type="text" id="ciudad_residencia" name="ciudad_residencia" required placeholder="Ejemplo: Ciudad Ejemplo" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="nacionalidad" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Nacionalidad:</label>
            <input type="text" id="nacionalidad" name="nacionalidad" required placeholder="Ejemplo: Ejemplano" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <button type="submit" class="block w-full mt-6 bg-emerald-900 hover:bg-emerald-800 focus:outline-none focus:text-gray-300 transition duration-150 ease-in-out">Guardar Datos</button>
        </form>

        <!-- Formulario de Experiencia Laboral -->
        <div id="experience-form" class="mt-6">
            <h2 class="text-xl font-bold mb-4">Experiencia Laboral</h2>
            
            <label for="titulo_puesto" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Título del Puesto:</label>
            <input type="text" id="titulo_puesto" name="titulo_puesto" required placeholder="Ejemplo: Analista de Sistemas" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="empresa" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Empresa:</label>
            <input type="text" id="empresa" name="empresa" required placeholder="Ejemplo: Ejemplo S.A." class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="lugar_trabajo" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Lugar de Trabajo:</label>
            <input type="text" id="lugar_trabajo" name="lugar_trabajo" placeholder="Ejemplo: Ciudad Ejemplo" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="fecha_inicio" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Fecha de Inicio:</label>
            <input type="date" id="fecha_inicio" name="fecha_inicio" required placeholder="Ejemplo: 2015-06-01" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="fecha_fin" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Fecha Fin:</label>
            <input type="date" id="fecha_fin" name="fecha_fin" required placeholder="Ejemplo: 2019-05-31" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="descripcion_responsabilidades" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Descripción de las Responsabilidades:</label>
            <textarea id="descripcion_responsabilidades" name="descripcion_responsabilidades" required placeholder="Ejemplo: Desarrollar y mantener sistemas informáticos." class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4"></textarea>
            
            <button type="submit" id="add-experience-btn" class="block w-full mt-6 bg-emerald-900 hover:bg-emerald-800 focus:outline-none focus:text-gray-300 transition duration-150 ease-in-out">Agregar Experiencia</button>
        </div>

        <!-- Formulario de Educación -->
        <div id="education-form" class="mt-6">
            <h2 class="text-xl font-bold mb-4">Educación</h2>
            
            <label for="nombre_institucion" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Nombre de la Institución:</label>
            <input type="text" id="nombre_institucion" name="nombre_institucion" required placeholder="Ejemplo: Universidad Ejemplo" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="titulo_obtenido" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Título Obtenido:</label>
            <input type="text" id="titulo_obtenido" name="titulo_obtenido" required placeholder="Ejemplo: Licenciatura en Informática" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <label for="anio_graduacion" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Año Graduación:</label>
            <input type="number" id="anio_graduacion" name="anio_graduacion" required min="1900" max="2050" placeholder="Ejemplo: 2010" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <button type="submit" id="add-education-btn" class="block w-full mt-6 bg-emerald-900 hover:bg-emerald-800 focus:outline-none focus:text-gray-300 transition duration-150 ease-in-out">Agregar Educación</button>
        </div>

        <!-- Formulario de Habilidades y Certificaciones -->
        <div id="skills-form" class="mt-6">
            <h2 class="text-xl font-bold mb-4">Habilidades y Certificaciones</h2>
            
            <label for="habilidad_certificacion" class="block text-gray-300 font-bold md:text-lg lg:text-xl">Habilidad/Certificación:</label>
            <input type="text" id="habilidad_certificacion" name="habilidad_certificacion" required placeholder="Ejemplo: Excel Profesional" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <button type="submit" id="add-skill-btn" class="block w-full mt-6 bg-emerald-900 hover:bg-emerald-800 focus:outline-none focus:text-gray-300 transition duration-150 ease-in-out">Agregar Habilidad/Certificación</button>
        </div>

        <!-- Botón para generar CV -->
        <div id="generate-cv-form" class="mt-6">
            <h2 class="text-xl font-bold mb-4">Generar CV</h2>
            
            <label for="id-candidato" class="block text-gray-300 font-bold md:text-lg lg:text-xl">ID del Candidato:</label>
            <input type="number" id="id-candidato" name="id-candidato" required placeholder="Ejemplo: 123456789" class="w-full bg-gray-800 border-b-2 border-green-700 focus:border-green-500 text-white p-4">
            
            <button type="submit" id="generate-cv-btn" class="block w-full mt-6 bg-emerald-900 hover:bg-emerald-800 focus:outline-none focus:text-gray-300 transition duration-150 ease-in-out">Generar CV</button>
        </div>

        <!-- Vista previa del CV -->
        <div id="cv-preview" class="mt-6">
            <h2 class="text-xl font-bold mb-4">Vista Previa del CV</h2>
            <p class="text-gray-300 text-lg">Este es un ejemplo de vista previa del currículum. Puedes editar el contenido antes de descargar.</p>
        </div>
    </div>

    <!-- Script para manejar la lógica del frontend -->
    <script src='app.js'></script>
</body>
</html>
