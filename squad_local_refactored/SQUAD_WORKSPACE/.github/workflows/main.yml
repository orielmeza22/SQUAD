#!/bin/bash
# This workflow is triggered on push to the main branch.

name: FastAPI CI/CD
on:
  push:
    branches:
      - main
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.8'
    - name: Install dependencies
      run: pip install fastapi uvicorn pytest
    - name: Run tests
      run: pytest